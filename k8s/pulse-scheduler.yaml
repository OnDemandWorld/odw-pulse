apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-scheduler
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-scheduler
  template:
    metadata:
      labels:
        app: pulse-scheduler
    spec:
      containers:
        - name: pulse-scheduler
          image: ondemandworld/pulse-scheduler:latest
          envFrom:
            - configMapRef:
                name: pulse-config
            - secretRef:
                name: pulse-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://pulse:$(POSTGRES_PASSWORD)@postgres:5432/pulse"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
