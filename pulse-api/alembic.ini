# Alembic configuration for Pulse.
#
# The database URL is loaded from the application Settings at runtime
# (see pulse/db/migrations/env.py).  The value below is a safe fallback
# that is only used by offline Alembic commands such as
# ``alembic history`` or ``alembic check --offline``.

[alembic]
script_location = src/pulse/db/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = src
sqlalchemy.url = postgresql+asyncpg://pulse:pulse@localhost:5432/pulse

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
